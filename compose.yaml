services:
  postgres:
    image: postgres:16-alpine
    container_name: design-handbook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: handbook
      POSTGRES_USER: handbook
      POSTGRES_PASSWORD: handbook
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U handbook -d handbook"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - handbook-postgres-data:/var/lib/postgresql/data

volumes:
  handbook-postgres-data:
